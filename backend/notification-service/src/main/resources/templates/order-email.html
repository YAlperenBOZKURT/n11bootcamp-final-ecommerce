<!doctype html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>{{title}}</title>
</head>
<body style="margin:0;padding:0;background:#f8fafc;font-family:Arial,Helvetica,sans-serif;color:#0f172a;">
  <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="padding:24px 0;">
    <tr>
      <td align="center">
        <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="max-width:600px;background:#ffffff;border:1px solid #e2e8f0;border-radius:14px;overflow:hidden;">
          <tr>
            <td style="background:linear-gradient(135deg,#1d4ed8,#2563eb);padding:20px 24px;color:#fff;">
              <div style="font-size:18px;font-weight:700;">Bozkurt</div>
              <div style="font-size:12px;opacity:.9;">Sipariş Bildirimi</div>
            </td>
          </tr>
          <tr>
            <td style="padding:24px;">
              <h1 style="margin:0 0 8px;font-size:22px;line-height:1.3;">{{heading}}</h1>
              <p style="margin:0 0 16px;color:#334155;">{{subtitle}}</p>
              <div style="font-size:14px;line-height:1.7;color:#0f172a;">{{body}}</div>
            </td>
          </tr>
          <tr>
            <td style="padding:0 24px 24px;">
              <p style="margin:0;color:#64748b;font-size:13px;line-height:1.6;">{{footer}}</p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
