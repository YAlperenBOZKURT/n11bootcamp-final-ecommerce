spring:
  config:
    import: ""
  cloud:
    config:
      enabled: false
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.amqp.RabbitAutoConfiguration
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

eureka:
  client:
    enabled: false

logging:
  level:
    root: WARN
    com.yabozkurt.n11bootcamp.ecommerce.cart: INFO
    org.testcontainers: WARN
