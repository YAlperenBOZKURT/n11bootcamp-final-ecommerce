spring:
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/userdb
    username: ${POSTGRES_USER:postgres}
    password: ${POSTGRES_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
  rabbitmq:
    host: ${RABBITMQ_HOST:rabbitmq}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}

rabbitmq:
  exchange:
    users: user.events
  queues:
    user-registered: user.registered
    password-reset-requested: user.password-reset-requested

jwt:
  secret: ${JWT_SECRET:ecommerce-secret-key-n11bootcamp-yabozkurt-2025}
  expiration: 900000
  refresh-expiration-days: 7

app:
  security:
    cookies:
      secure: ${APP_COOKIES_SECURE:false}
      same-site: ${APP_COOKIES_SAMESITE:Lax}

logging:
  level:
    root: INFO
    com.yabozkurt.n11bootcamp.ecommerce.user: INFO
    org.springframework: WARN
    org.hibernate: WARN

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always
