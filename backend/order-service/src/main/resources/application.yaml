server:
  port: 8767

spring:
  application:
    name: order-service
  config:
    import: "optional:configserver:${CONFIG_SERVER_URL:http://localhost:8762}"
  cloud:
    config:
      fail-fast: true
      retry:
        max-attempts: 10
        initial-interval: 3000
        max-interval: 10000

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_SERVER_URL:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true